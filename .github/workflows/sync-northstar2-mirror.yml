# Mirror northstar main → sfc-gh-kenguyen/northstar-2 for Streamlit northstar2.streamlit.app
# (That Cloud app cannot be repointed to the northstar repo in the UI.)
#
# One-time setup: add repo secret northstar_mirror (or NORTHSTAR2_MIRROR_TOKEN) — a PAT
# with Contents write on northstar-2 (fine-grained token scoped to that repo is enough).

name: Sync northstar-2 mirror

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout northstar main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to northstar-2
        env:
          NORTHSTAR_MIRROR: ${{ secrets.northstar_mirror }}
          NORTHSTAR2_MIRROR_TOKEN: ${{ secrets.NORTHSTAR2_MIRROR_TOKEN }}
        run: |
          set -euo pipefail
          MIRROR_TOKEN="${NORTHSTAR_MIRROR:-${NORTHSTAR2_MIRROR_TOKEN:-}}"
          if [ -z "${MIRROR_TOKEN}" ]; then
            echo "::error::Missing repo secret northstar_mirror (or NORTHSTAR2_MIRROR_TOKEN) — PAT with write access to northstar-2."
            exit 1
          fi
          git config --global credential.helper ""
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push "https://x-access-token:${MIRROR_TOKEN}@github.com/sfc-gh-kenguyen/northstar-2.git" HEAD:main
